name: WhisperMemo
options:
  bundleIdPrefix: de.bay-ram
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""
    # Xcode "Update to recommended settings" — baked in so xcodegen keeps them
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"

targets:
  WhisperMemo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WhisperMemo
        excludes:
          - "Info.plist"
    info:
      path: WhisperMemo/Info.plist
      properties:
        CFBundleDisplayName: WhisperMemo
        CFBundleIdentifier: de.bay-ram.WhisperMemo
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "WhisperMemo benötigt das Mikrofon für Sprachaufnahmen auf der Baustelle."
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.bay-ram.WhisperMemo
        INFOPLIST_FILE: WhisperMemo/Info.plist
        CODE_SIGN_STYLE: Automatic
