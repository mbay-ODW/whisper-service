name: WhisperMemo
options:
  bundleIdPrefix: de.bay-ram
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16"
  # Don't regenerate Info.plist — file is hand-managed (background modes etc.)
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: 5.9
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    # Xcode "Update to recommended settings" — baked in so xcodegen keeps them
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
    LOCALIZED_STRING_SWIFTUI_SUPPORT: "YES"

targets:
  WhisperMemo:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: WhisperMemo
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.bay-ram.WhisperMemo
        INFOPLIST_FILE: WhisperMemo/Info.plist
        CODE_SIGN_STYLE: Automatic
